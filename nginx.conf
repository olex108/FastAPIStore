server {
    listen 80;
    server_name localhost;

    # Максимальный размер загружаемого файла
    client_max_body_size 20M;

    charset utf-8;

    # 1. Раздача медиа-файлов (Чеки, изображения)
    location /media/ {
        alias /app/media/;
        expires 7d;             # Кэшировать на 7 дней
        add_header Cache-Control "public";
        # Автоматически скачивать файлы .xlsx вместо открытия в браузере
        types {
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet  xlsx;
        }
    }

    # 2. Проксирование всех запросов к FastAPI
    location / {
        proxy_pass http://app:8080; # "app" — имя сервиса в docker-compose

        # Передаем IP-адреса пользователей
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Настройки для WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Тайм-ауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. Обработка ошибок (опционально)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
